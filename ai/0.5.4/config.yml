fields:
  - name: EMBEDDING_MODEL
    label:
      en: Embedding model
      zh: Embedding 模型
    description:
      en: "Embedding model for help-docs retrieval. Changing it triggers an automatic index rebuild on next start."
      zh: "帮助知识库检索使用的 embedding 模型。更换模型后下次启动会自动重建索引。"
    type: select
    required: true
    options:
      - label:
          en: "Qwen Embedding (Recommended)"
          zh: "通义千问 Embedding（推荐）"
        value: "qwen3-embedding:0.6b"
      - label:
          en: "BGE Multilingual Embedding"
          zh: "BGE 多语言 Embedding"
        value: bge-m3
    default: "qwen3-embedding:0.6b"
  - name: KB_INGEST_TOKEN
    label:
      en: KB reindex token
      zh: 知识库重建令牌
    description:
      en: "Internal token for manually triggering POST /kb/reindex to rebuild the knowledge base index."
      zh: "手动调 POST /kb/reindex 重建知识库索引时使用的内部令牌。"
    type: password
    required: false
    default: "$random:48"

menu_items:
  - location: application
    label:
      en: AI Assistants
      zh: AI 助手
    url: "ai/?theme={system_theme}&lang={system_lang}"
    url_type: iframe
    immersive: true
    capsule:
      visible: true
      top: 18
      right: 18
require_version:
  version: "> 1.7.90"
  reason:
    en: "Page operations require the main app's fd injection (assistant/auth) and operation dispatch endpoints (>= 1.7.91)"
    zh: "页面操作依赖主程序的 fd 注入（assistant/auth）与操作派发端点（需 >= 1.7.91）"
hooks:
  upgrade: |
    exit 0
  # 订阅应用生命周期广播（任一应用装/更/卸）→ 触发知识库 reconcile，使 AI 助手可检索的
  # 应用文档始终与"装了哪些应用"一致。
  # - 令牌走 ${KB_INGEST_TOKEN} 占位符，由 config 解析时替换（不落明文）。
  # - 把广播附带的 ${INSTALLED_APPS}（已安装应用清单 JSON）原样带进 body：AI 据此到只读挂载的
  #   apps 目录里自取各应用 knowledge_base。必须用裸 ${INSTALLED_APPS}（运行时由 hook env 注入、
  #   bash 展开）；切勿写成 ${INSTALLED_APPS:-[]}——compose 规范插值会在 config 解析期把它吃成 []。
  # - hook 在 AppStore 容器内执行，经 docker 网络访问 ai:5001。
  app_install:
    cmd: 'curl -sf -m 15 -X POST http://ai:5001/kb/reindex -H "X-Ingest-Token: ${KB_INGEST_TOKEN}" -H "Content-Type: application/json" -d "{\"mode\":\"reconcile\",\"apps\":${INSTALLED_APPS}}"'
  # 装/更/卸三事件触发同一次 reconcile，用 @ 引用复用 app_install 的命令，避免重复
  app_update: '@app_install'
  app_uninstall: '@app_install'
