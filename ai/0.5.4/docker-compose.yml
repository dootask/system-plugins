services:
  ai:
    image: "dootask/ai:${PLUGIN_VERSION}"
    restart: unless-stopped
    environment:
      # 连主项目 redis（向量存 Redis 8+ 原生 vectorset）；变量由 AppStore compose --env-file 主仓库 .env 提供，
      # 其中 REDIS_PASSWORD=null 是字面量，代码侧按无密码处理
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      TIMEOUT: 600
      # embedding 服务地址/密钥内置在镜像里（默认 DooTask 官方），在主程序 .env 设置
      # EMBEDDING_BASE_URL / EMBEDDING_API_KEY 即可覆盖
      # 注意：AppStore 的 ReplaceParams 只匹配精确 ${KEY}，fields 变量不要用 ${KEY:-default} 语法
      KB_CONTENT_DIR: /app/kb-content
      # 已安装应用包根（只读挂载 docker/appstore/apps）：AI 据广播事件下发的已装应用清单
      # 到此逐应用自取 knowledge_base 目录入库，不再依赖 AppStore 复制 overlay
      APPS_DIR: /app/apps
      KB_INGEST_TOKEN: "${KB_INGEST_TOKEN}"
      RAG_ENABLED: "${RAG_ENABLED:-true}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL}"
    volumes:
      - dootask-ai-config:/app/config
      # 只读挂载主仓库 ai-kb 内容
      # 用 AppStore 注入的 ${ROOT_PATH}（指向宿主机 dootask 根目录），跨部署位置自动 work
      # 不能用相对路径里的 .. —— AppStore 会 normalize 让它走不出 app 目录
      - "${ROOT_PATH}/resources/ai-kb:/app/kb-content:ro"
      # 只读挂载已安装应用包目录（仅 apps，绝不挂整个 docker/appstore——config/ 含解析后明文密钥）
      # AI 自取各应用包里的 knowledge_base 目录，AppStore 不再复制 overlay
      - "${ROOT_PATH}/docker/appstore/apps:/app/apps:ro"

volumes:
  dootask-ai-config:
