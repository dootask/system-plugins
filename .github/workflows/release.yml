name: Release

# 系统插件统一发布工作流（通用、零硬编码）。
#
# 触发：推送 `<插件>/<版本>` 形式的 tag，例如：
#   office/9.4.0   drawio/24.7.17   ai/0.5.4   approve/0.2.0
# 工作流从 tag 解析出插件名与版本，按目录约定打包并发布，**不含任何按插件写死的配置**：
#   - appid           = 插件目录名（与 DooTask AppStore 的 appid 一致）
#   - is_system_app   = true（本仓库全是系统插件）
#   - 打包内容        = <插件>/{config.yml,logo*,README*} + 仅 <插件>/<版本>/（源码等其余文件不入包）
#
# 可选构建镜像：若 <插件>/.build.yml 存在，则先构建并推送 Docker 镜像（image:<版本> 和 :latest）
# 再发布；没有该文件的插件（office/drawio…）跳过构建。构建信息（镜像名/上下文/Dockerfile）
# 全在插件目录的 .build.yml 里，因此新增/维护插件都无需改本工作流。
#
# Repository Secrets：
#   DOOTASK_USERNAME、DOOTASK_PASSWORD          —— 所有插件发布都需要
#   DOCKER_USERNAME、DOCKER_PASSWORD            —— 仅含 .build.yml 的插件（构建镜像）需要

on:
  push:
    tags:
      - '*/*'        # 仅匹配含一个斜杠的 tag（<插件>/<版本>）；纯版本号 tag 不会触发

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Parse & validate tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          PLUGIN="${TAG%/*}"
          VERSION="${TAG##*/}"
          if [ -z "$PLUGIN" ] || [ -z "$VERSION" ] || [ "$PLUGIN" = "$TAG" ]; then
            echo "::error::tag 必须是 <插件>/<版本> 形式，如 office/9.4.0（当前: $TAG）"
            exit 1
          fi
          if [ ! -f "$PLUGIN/config.yml" ]; then
            echo "::error::缺少 $PLUGIN/config.yml —— 插件目录不存在或不合规"
            echo "可用插件目录："; ls -1d */ 2>/dev/null
            exit 1
          fi
          if [ ! -d "$PLUGIN/$VERSION" ]; then
            echo "::error::缺少版本目录 $PLUGIN/$VERSION/"
            echo "$PLUGIN 现有版本："; ls -1d "$PLUGIN"/*/ 2>/dev/null
            exit 1
          fi
          echo "plugin=$PLUGIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::将发布插件 $PLUGIN 版本 $VERSION（appid=$PLUGIN）"

      - name: Read build descriptor
        id: build
        run: |
          PLUGIN="${{ steps.parse.outputs.plugin }}"
          BF="$PLUGIN/.build.yml"
          if [ -f "$BF" ]; then
            img=$(grep -E '^image:'      "$BF" | head -1 | sed -E 's/^image:[[:space:]]*//; s/[[:space:]]*$//; s/^"//; s/"$//')
            ctx=$(grep -E '^context:'    "$BF" | head -1 | sed -E 's/^context:[[:space:]]*//; s/[[:space:]]*$//'); ctx="${ctx:-.}"
            df=$(grep  -E '^dockerfile:' "$BF" | head -1 | sed -E 's/^dockerfile:[[:space:]]*//; s/[[:space:]]*$//'); df="${df:-Dockerfile}"
            if [ -z "$img" ]; then echo "::error::$BF 缺少 image 字段"; exit 1; fi
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "image=$img" >> "$GITHUB_OUTPUT"
            echo "context=$PLUGIN/$ctx" >> "$GITHUB_OUTPUT"
            echo "dockerfile=$PLUGIN/$df" >> "$GITHUB_OUTPUT"
            echo "::notice::$PLUGIN 需构建镜像 $img（context=$PLUGIN/$ctx）"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$PLUGIN 无 .build.yml，跳过镜像构建"
          fi

      - name: Set up QEMU
        if: steps.build.outputs.needs_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.build.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.build.outputs.needs_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        if: steps.build.outputs.needs_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.build.outputs.context }}
          file: ${{ steps.build.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.build.outputs.image }}:${{ steps.parse.outputs.version }}
            ${{ steps.build.outputs.image }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create package
        run: |
          PLUGIN="${{ steps.parse.outputs.plugin }}"
          VERSION="${{ steps.parse.outputs.version }}"
          rm -rf pkg && mkdir -p pkg
          # 顶层文件全收（config.yml/logo*/README* 等；排除 .build.yml/.gitignore 等点文件）
          find "$PLUGIN" -maxdepth 1 -type f ! -name '.*' -exec cp {} pkg/ \;
          # 目标版本目录
          cp -r "$PLUGIN/$VERSION" "pkg/$VERSION"
          # 其余顶层目录：含 docker-compose.yml 的是「别的版本目录」→跳过；src/→跳过；
          # 其余（如 icon/ 等被 config 引用的资源目录）→入包。AppStore 不允许重复版本号，故只带本版本。
          for d in "$PLUGIN"/*/; do
            base=$(basename "$d")
            [ "$base" = "$VERSION" ] && continue
            [ "$base" = "src" ] && continue
            [ -f "$d/docker-compose.yml" ] && continue
            cp -r "$d" "pkg/$base"
          done
          (cd pkg && tar -czf ../dootask-plugin.tar.gz .)
          echo "Package for $PLUGIN/$VERSION:"
          tar -tzf dootask-plugin.tar.gz | head -50

      - name: Publish to DooTask App Store
        uses: dootask/appstore-action@v3
        with:
          username: ${{ secrets.DOOTASK_USERNAME }}
          password: ${{ secrets.DOOTASK_PASSWORD }}
          appid: ${{ steps.parse.outputs.plugin }}
          package_file: ./dootask-plugin.tar.gz
          draft: false
          is_system_app: true
