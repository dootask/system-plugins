# 静态资源（vite 产物，物理在容器 /assets）：剥掉 /apps/approve 前缀映射到容器根的 /assets。
# 必须放在通用 location 之前（nginx 取最长前缀匹配）。
location /apps/approve/assets/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://approve:3000/assets/;
}

# 页面(SSR) + 接口(/api)：不剥前缀，TanStack 已用 basepath=/apps/approve 接管整个前缀。
location /apps/approve/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://approve:3000;
}
